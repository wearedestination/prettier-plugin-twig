# https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        node-version: [22.x, 24.x]

    name: OS ${{ matrix.os }} / NodeJS ${{ matrix.node-version }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          cache: true

      - name: Install the packages
        run: pnpm install --frozen-lockfile

      - name: Build the code
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Check formatting
        run: pnpm format:check

      - name: Run the unit tests
        run: pnpm test

      - name: Run the idempotence tests
        run: pnpm test:idempotence

  # Aggregate gate with a stable name for branch protection to require,
  # so the matrix can change without updating the required-check config.
  ci-success:
    name: CI Success
    if: always()
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any matrix job failed
        if: needs.lint.result != 'success'
        run: |
          echo "lint matrix result: ${{ needs.lint.result }}"
          exit 1
